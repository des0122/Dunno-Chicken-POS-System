<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鸡道订单系统</title>
  <link rel="icon" type="image/png" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="鸡道订单系统">
  <meta name="theme-color" content="#d60000">
  <style>
    :root {
      --brand-red: #d60000;
      --brand-red-dark: #a80000;
      --brand-red-soft: #ffe4e1;
      --brand-yellow: #ffd43b;
      --brand-yellow-soft: #fff4bf;
      --brand-orange: #ff922b;
      --brand-ink: #40210f;
      --bg: #fff8f3;
      --card: #ffffff;
      --line: #f1d9cc;
      --shadow: 0 10px 28px rgba(214, 0, 0, 0.08);
      --shadow-soft: 0 6px 18px rgba(64, 33, 15, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top right, #fff0cc 0%, transparent 24%),
        radial-gradient(circle at top left, #ffe5dc 0%, transparent 22%),
        var(--bg);
      color: var(--brand-ink);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px;
    }

    .brand-hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, var(--brand-red) 0%, #ef3b2d 100%);
      color: #fff;
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 18px 36px rgba(214, 0, 0, 0.2);
    }

    .brand-hero::before,
    .brand-hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
    }

    .brand-hero::before {
      width: 220px;
      height: 220px;
      right: -60px;
      top: -90px;
    }

    .brand-hero::after {
      width: 160px;
      height: 160px;
      left: -50px;
      bottom: -80px;
    }

    .brand-top {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .brand-logo {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.24);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-title {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
    }

    .brand-subtitle {
      margin-top: 6px;
      color: rgba(255,255,255,0.88);
      font-size: 14px;
    }

    .brand-meta {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .brand-pill {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #ffe3d5;
      box-shadow: var(--shadow-soft);
    }

    .card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-kicker {
      display: inline-block;
      margin-bottom: 8px;
      background: var(--brand-yellow-soft);
      color: #9a5b00;
      border: 1px solid #ffe08a;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    h1, h2, h3 {
      margin: 0;
    }

    h2 {
      font-size: 22px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tab-btn {
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
      background: #fff;
      color: var(--brand-red);
      border: 1px solid #ffd4cf;
      box-shadow: 0 4px 12px rgba(214, 0, 0, 0.05);
      transition: 0.2s ease;
    }

    .tab-btn.active {
      background: var(--brand-red);
      color: #fff;
      border-color: var(--brand-red);
      box-shadow: 0 10px 20px rgba(214, 0, 0, 0.18);
    }

    .tab {
      display: none;
    }

    .tab.active {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .product-btn {
      border: 1px solid #ffd9c6;
      background: linear-gradient(180deg, #fffdf9 0%, #fff4eb 100%);
      border-radius: 18px;
      padding: 16px;
      cursor: pointer;
      text-align: left;
      font-weight: 800;
      color: var(--brand-ink);
      box-shadow: 0 8px 18px rgba(255, 146, 43, 0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .product-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(255, 146, 43, 0.14);
    }

    .product-btn span {
      display: block;
      margin-top: 8px;
      color: #8a5a3b;
      font-weight: 700;
      font-size: 14px;
    }

    .order-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-bottom: 1px dashed #f0ccb8;
      padding: 12px 0;
    }

    .small-btn, .primary-btn {
      border: none;
      border-radius: 14px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 800;
      transition: 0.2s ease;
    }

    .small-btn {
      background: #fff5ee;
      color: var(--brand-red);
      border: 1px solid #ffd8c9;
    }

    .small-btn:hover {
      background: #ffece1;
    }

    .primary-btn {
      background: linear-gradient(180deg, var(--brand-red) 0%, var(--brand-red-dark) 100%);
      color: #fff;
      width: 100%;
      box-shadow: 0 12px 20px rgba(214, 0, 0, 0.18);
    }

    .primary-btn[disabled], .small-btn[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .summary-boxes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .summary-box {
      background: linear-gradient(180deg, #fffefb 0%, #fff7f1 100%);
      border: 1px solid #ffe2d4;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 18px rgba(64, 33, 15, 0.05);
    }

    .summary-label {
      font-size: 13px;
      color: #9b6a46;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .summary-value {
      font-size: 26px;
      font-weight: 900;
      color: var(--brand-ink);
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #ffd8cb;
      border-radius: 14px;
      font-size: 15px;
      background: #fffdfb;
      color: var(--brand-ink);
      outline: none;
    }

    input:focus {
      border-color: var(--brand-orange);
      box-shadow: 0 0 0 4px rgba(255, 146, 43, 0.12);
    }

    .kitchen-order {
      border: 1px solid #ffe0d3;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      background: linear-gradient(180deg, #fffefa 0%, #fff6ee 100%);
      box-shadow: var(--shadow-soft);
    }

    .muted {
      color: #8a6a55;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status-text {
      margin-top: 10px;
      font-size: 14px;
      color: #067647;
      font-weight: 700;
    }

    .timer-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .timer-box {
      padding: 11px 13px;
      border-radius: 14px;
      background: #fff1e8;
      border: 1px solid #ffd0b8;
      font-weight: 800;
      color: #9a3412;
    }

    /* 🔥 最后10秒警告效果 */
.timer-box.warning {
  animation: dangerPulse 1s infinite;
  border-color: #ff0000;
}

@keyframes dangerPulse {
  0% {
    background: #fff1e8;
    box-shadow: 0 0 0px rgba(255, 0, 0, 0);
  }
  50% {
    background: #ff4d4f;
    color: white;
    box-shadow: 0 0 12px rgba(255, 0, 0, 0.7);
  }
  100% {
    background: #fff1e8;
    box-shadow: 0 0 0px rgba(255, 0, 0, 0);
  }
}

    .timer-box.done {
      background: #f1fff3;
      border: 1px solid #b7efc0;
      color: #067647;
    }

    .action-list {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .action-btn-disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .status-badge {
      display: inline-block;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      margin-top: 10px;
      letter-spacing: 0.2px;
    }

    .status-pending {
      background: #fff3cd;
      color: #9a6700;
      border: 1px solid #ffe08a;
    }

    .status-cooking {
      background: #ffe8cc;
      color: #b85c00;
      border: 1px solid #ffc078;
    }

    .status-ready {
      background: #dcfce7;
      color: #067647;
      border: 1px solid #86efac;
    }

    .kitchen-meta {
      margin-top: 8px;
      font-size: 13px;
      color: #8a6a55;
      font-weight: 700;
    }

    .brand-divider {
      height: 10px;
      width: 74px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--brand-yellow), var(--brand-orange), var(--brand-red));
      margin: 10px 0 0;
    }

    @media (max-width: 640px) {
      .wrap { padding: 14px; }
      .brand-title { font-size: 24px; }
      .brand-logo { width: 62px; height: 62px; border-radius: 18px; }
      .summary-value { font-size: 22px; }
      .tab-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand-hero">
      <div class="brand-top">
        <div class="brand-logo">
          <img src="apple-touch-icon.png" alt="鸡道 Logo">
        </div>
        <div>
          <h1 class="brand-title">鸡道订单系统</h1>
          <div class="brand-subtitle">小鸡出手，订单要稳 · 下单 / 厨房 / 报表</div>
          <div class="brand-divider"></div>
        </div>
      </div>
      <div class="brand-meta">
        <div class="brand-pill">🍗 鸡排 2 分钟</div>
        <div class="brand-pill">🍟 薯条 4 分钟</div>
        <div class="brand-pill">📱 可加到主画面</div>
      </div>
    </div>


    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('orderTab', this)">🧾 下单</button>
      <button class="tab-btn" onclick="showTab('kitchenTab', this)">🍗 厨房</button>
      <button class="tab-btn" onclick="showTab('reportTab', this)">📊 报表</button>
    </div>

    <div id="orderTab" class="tab active">
      <div class="card">
        <span class="section-kicker">建立新单</span>
        <div class="card-title-row">
          <h2>选产品</h2>
        </div>
        <div class="grid">
          <button class="product-btn" onclick="addItem('Combo', 11)">🍗🍟 Combo<span>RM 11.00</span></button>
          <button class="product-btn" onclick="addItem('Original', 7.5)">🍗 Original<span>RM 7.50</span></button>
          <button class="product-btn" onclick="addItem('Spicy', 8)">🌶️ Spicy<span>RM 8.00</span></button>
          <button class="product-btn" onclick="addItem('Seaweed', 8)">🍃 Seaweed<span>RM 8.00</span></button>
          <button class="product-btn" onclick="addItem('Fries', 4)">🍟 Fries<span>RM 4.00</span></button>
        </div>
      </div>

      <div class="card">
        <span class="section-kicker">本单内容</span>
        <div class="card-title-row">
          <h2>当前订单</h2>
        </div>
        <div id="currentOrderList"></div>
        <div class="summary-boxes" style="margin-top:14px;">
          <div class="summary-box">
            <div class="summary-label">Order Number</div>
            <div class="summary-value" id="currentOrderNumber">-</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">总额</div>
            <div class="summary-value" id="currentTotal">RM 0.00</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">付款方式</div>
            <div class="summary-value" style="font-size:18px;">QR 已付</div>
          </div>
        </div>
        <div style="margin-top:14px;">
          <input id="notes" type="text" placeholder="备注（可留空）" />
        </div>
        <div style="margin-top:14px;">
          <button class="primary-btn" onclick="submitOrder()">确认下单</button>
        </div>
      </div>
    </div>

    <div id="kitchenTab" class="tab">
      <div class="card">
        <span class="section-kicker">出餐区</span>
        <div class="card-title-row">
          <h2>厨房看单</h2>
          <button class="small-btn" onclick="loadOrders()">刷新订单</button>
        </div>
        <div id="kitchenList" style="margin-top:12px;"></div>
      </div>
    </div>

    <div id="reportTab" class="tab">
      <div class="card">
        <span class="section-kicker">今日战绩</span>
        <div class="card-title-row">
          <h2>今日报表</h2>
          <button class="small-btn" onclick="loadOrders()">刷新报表</button>
        </div>
        <div class="summary-boxes" style="margin-top:12px;">
          <div class="summary-box"><div class="summary-label">今日总单数</div><div class="summary-value" id="reportOrders">0</div></div>
          <div class="summary-box"><div class="summary-label">今日总收入</div><div class="summary-value" id="reportRevenue">RM 0.00</div></div>
          <div class="summary-box"><div class="summary-label">今日已出餐</div><div class="summary-value" id="reportCollected">0</div></div>
          <div class="summary-box"><div class="summary-label">今日未出餐</div><div class="summary-value" id="reportUncollected">0</div></div>
          <div class="summary-box"><div class="summary-label">Combo</div><div class="summary-value" id="reportCombo">0</div></div>
          <div class="summary-box"><div class="summary-label">Original</div><div class="summary-value" id="reportOriginal">0</div></div>
          <div class="summary-box"><div class="summary-label">Spicy</div><div class="summary-value" id="reportSpicy">0</div></div>
          <div class="summary-box"><div class="summary-label">Seaweed</div><div class="summary-value" id="reportSeaweed">0</div></div>
          <div class="summary-box"><div class="summary-label">Fries</div><div class="summary-value" id="reportFries">0</div></div>
        </div>
      </div>
    </div>
  </div>

  <script>

    const doneSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    doneSound.volume = 0.7;

    const API_URL = "https://script.google.com/macros/s/AKfycbzl9COfgZxa0DoTKkoaeFrkIZ5cYmBHvEIrKBBupFt8kpmKNz3s5klFDOPYJnNIWKAzRA/exec";

    let currentOrder = [];
    let orderData = { orders: [], items: [] };
    let activeTimers = {};
    let kitchenState = {};

    function showTab(tabId, btn) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
      if (tabId === 'kitchenTab' || tabId === 'reportTab') loadOrders();
    }

    function setStatus(text, isError = false) {
      const el = document.getElementById('statusText');
      if (!el) return; // ⭐ 防 crash

      el.textContent = text;
      el.style.color = isError ? '#b42318' : '#067647';
    }

    function formatMoney(v) {
      return 'RM ' + Number(v).toFixed(2);
    }

    function generateOrderNumber() {
      return 'ORD' + Date.now().toString().slice(-6);
    }

    function addItem(name, price) {
      const found = currentOrder.find(i => i.name === name);
      if (found) found.qty += 1;
      else currentOrder.push({ name, price, qty: 1 });
      renderCurrentOrder();
    }

    function changeQty(name, delta) {
      const item = currentOrder.find(i => i.name === name);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) currentOrder = currentOrder.filter(i => i.name !== name);
      renderCurrentOrder();
    }

    function getCurrentTotal() {
      return currentOrder.reduce((sum, item) => sum + item.price * item.qty, 0);
    }

    function renderCurrentOrder() {
      const list = document.getElementById('currentOrderList');
      const orderNumber = generateOrderNumber();
      document.getElementById('currentOrderNumber').textContent = currentOrder.length ? orderNumber : '-';
      document.getElementById('currentTotal').textContent = formatMoney(getCurrentTotal());

      if (!currentOrder.length) {
        list.innerHTML = '<div class="muted">还没有加任何产品</div>';
        return;
      }

      list.innerHTML = currentOrder.map(item => `
        <div class="order-line">
          <div>
            <strong>${item.name}</strong><br>
            <span class="muted">${formatMoney(item.price)} x ${item.qty}</span>
          </div>
          <div class="row">
            <button class="small-btn" onclick="changeQty('${item.name}', -1)">-</button>
            <button class="small-btn" onclick="changeQty('${item.name}', 1)">+</button>
          </div>
        </div>
      `).join('');
    }

    async function submitOrder() {
      if (!currentOrder.length) {
        setStatus('请先加产品', true);
        return;
      }

      const orderNumber = generateOrderNumber();
      const total = getCurrentTotal();
      const notes = document.getElementById('notes').value.trim();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'createOrder',
            orderNumber,
            items: currentOrder,
            total,
            paymentStatus: 'QR 已付',
            orderStatus: 'Pending',
            notes
          })
        });

        const data = await res.json();
        if (data.success) {
          setStatus('订单已建立');
          currentOrder = [];
          document.getElementById('notes').value = '';
          renderCurrentOrder();
          loadOrders();
        } else {
          setStatus('下单失败：' + (data.error || '未知错误'), true);
        }
      } catch (err) {
        setStatus('提交失败：' + err.message, true);
      }
    }

    async function loadOrders() {

      try {
        const res = await fetch(API_URL + '?action=orders');
        const data = await res.json();
        orderData = data;
        fixCookingStatus();
        syncKitchenState();
        refreshReadyStatuses();
        renderKitchen();
        renderReport();
      } catch (err) {
        setStatus('读取订单失败', true);
      }
    }

    function fixCookingStatus() {
  (orderData.orders || []).forEach(order => {
    const state = kitchenState[order.orderNumber];
    if (!state) return;

    const anyStarted =
      state.chickenSlots.some(s => s.started) ||
      state.friesSlots.some(s => s.started);

    if (anyStarted) {
      order.orderStatus = 'Cooking';
    }
  });
}


    function getItemQtyForOrder(orderNumber, itemName) {
      return (orderData.items || [])
        .filter(item => item.orderNumber === orderNumber && item.itemName === itemName)
        .reduce((sum, item) => sum + (Number(item.quantity) || 0), 0);
    }

    function getChickenCount(order) {
  const items = (orderData.items || [])
    .filter(i => i.orderNumber === order.orderNumber);

  let total = 0;

  items.forEach(item => {
    const qty = Number(item.quantity) || 0;
    const result = explodeItem(item.itemName, qty);
    total += result.chicken;
  });

  return total;
}

function getFriesCount(order) {
  const items = (orderData.items || [])
    .filter(i => i.orderNumber === order.orderNumber);

  let total = 0;

  items.forEach(item => {
    const qty = Number(item.quantity) || 0;
    const result = explodeItem(item.itemName, qty);
    total += result.fries;
  });

  return total;
}

    function syncKitchenState() {
      const activeOrderNumbers = new Set((orderData.orders || [])
        .filter(order => order.orderStatus !== 'Collected')
        .map(order => order.orderNumber));

      Object.keys(kitchenState).forEach(orderNumber => {
        if (!activeOrderNumbers.has(orderNumber)) {
          delete kitchenState[orderNumber];
        }
      });

      activeOrderNumbers.forEach(orderNumber => {
  const order = (orderData.orders || []).find(o => o.orderNumber === orderNumber);

  if (!order) return;

  const chickenCount = getChickenCount(order);
  const friesCount = getFriesCount(order);

        if (!kitchenState[orderNumber]) {
          kitchenState[orderNumber] = {
            chickenSlots: Array.from({ length: chickenCount }, () => ({ started: false, done: false })),
            friesSlots: Array.from({ length: friesCount }, () => ({ started: false, done: false }))
          };
        } else {
          const state = kitchenState[orderNumber];
          while (state.chickenSlots.length < chickenCount) state.chickenSlots.push({ started: false, done: false });
          while (state.friesSlots.length < friesCount) state.friesSlots.push({ started: false, done: false });
        }
      });
    }

    function getStatusClass(status) {
      if (status === 'Pending') return 'status-pending';
      if (status === 'Cooking') return 'status-cooking';
      if (status === 'Ready') return 'status-ready';
      return 'status-pending';
    }

    function sortOrdersForKitchen(orders) {
      const rank = { Pending: 1, Cooking: 2, Ready: 3 };
      return [...orders].sort((a, b) => {
        const diff = (rank[a.orderStatus] || 99) - (rank[b.orderStatus] || 99);
        if (diff !== 0) return diff;
        return new Date(a.createdAt || 0) - new Date(b.createdAt || 0);
      });
    }

    function isOrderReady(orderNumber) {
  const state = kitchenState[orderNumber];
  if (!state) return false;

  // ❗加这一句（关键）
  const anyStarted =
    state.chickenSlots.some(s => s.started) ||
    state.friesSlots.some(s => s.started);

  if (!anyStarted) return false;

  const allChickenDone = state.chickenSlots.every(slot => slot.done);
  const allFriesDone = state.friesSlots.every(slot => slot.done);

  return allChickenDone && allFriesDone;
}

    function refreshReadyStatuses() {
      (orderData.orders || []).forEach(order => {
        if (order.orderStatus === 'Collected') return;
        if (isOrderReady(order.orderNumber)) {
          order.orderStatus = 'Ready';
        }
      });
    }

    function renderKitchen() {
      const kitchenList = document.getElementById('kitchenList');
      const activeOrders = sortOrdersForKitchen(
        (orderData.orders || []).filter(order => order.orderStatus !== 'Collected')
      );

      if (!activeOrders.length) {
        kitchenList.innerHTML = '<div class="muted">目前没有订单</div>';
        return;
      }

      kitchenList.innerHTML = activeOrders.map(order => {
        const state = kitchenState[order.orderNumber] || { chickenSlots: [], friesSlots: [] };

        const chickenButtons = state.chickenSlots.map((slot, index) => `
          <button
            class="small-btn ${slot.started ? 'action-btn-disabled' : ''}"
            ${slot.started ? 'disabled' : ''}
            onclick="startChickenTimer('${order.orderNumber}', ${index})"
          >
            开始炸鸡 #${index + 1}
          </button>
        `).join('');

        const friesButtons = state.friesSlots.map((slot, index) => `
          <button
            class="small-btn ${slot.started ? 'action-btn-disabled' : ''}"
            ${slot.started ? 'disabled' : ''}
            onclick="startFriesTimer('${order.orderNumber}', ${index})"
          >
            开始炸薯条 #${index + 1}
          </button>
        `).join('');

        const ready = isOrderReady(order.orderNumber);
        const chickenCount = getChickenCount(order);
        const friesCount = getFriesCount(order);

return `
  <div class="kitchen-order">
    <h3>${order.orderNumber}</h3>

    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px;">

      <span class="status-badge" style="
        background:${order.mode==='pickup'?'#fff3cd':'#e0f2fe'};
        color:${order.mode==='pickup'?'#9a6700':'#075985'};
        border:1px solid ${order.mode==='pickup'?'#ffe08a':'#7dd3fc'};
      ">
        ${order.mode==='delivery' ? '🚚 Delivery' : '🏠 Pickup'} 
      </span>

      ${order.receipt ? `
        <button class="small-btn" onclick="viewReceipt('${order.receipt}')">
          📸 Receipt
        </button>
      ` : ''}

    </div>

    <div class="muted">${order.itemsText}</div>
            <div class="status-badge ${getStatusClass(order.orderStatus)}">${order.orderStatus}</div>
            <div class="kitchen-meta">鸡排 ${chickenCount} 份 · 薯条 ${friesCount} 份</div>
            <div class="action-list">${chickenButtons}${friesButtons}</div>
            <div class="row" style="margin-top:10px;">
              <button class="primary-btn" style="width:auto;" onclick="markCollected('${order.orderNumber}')" ${!ready ? 'disabled' : ''}>出餐</button>
            </div>
            <div id="timers-${order.orderNumber}" class="timer-list"></div>
          </div>
        `;
      }).join('');

      restoreAllTimers();
    }

    function restoreAllTimers() {
      Object.keys(activeTimers).forEach(timerId => {
        const timer = activeTimers[timerId];
        const area = document.getElementById('timers-' + timer.orderNumber);
        if (!area) return;

        let box = document.getElementById(timerId);
        if (!box) {
          box = document.createElement('div');
          box.id = timerId;
          box.className = 'timer-box' + (timer.done ? ' done' : '');
          area.appendChild(box);
        }

        if (timer.done) {
          box.textContent = `${timer.label} #${timer.slotIndex + 1} 可以起锅`;
        } else {
          box.textContent = formatTimerText(timer.label, timer.slotIndex + 1, timer.remaining);
        }
      });
    }

    function formatTimerText(label, index, remaining) {
      const min = Math.floor(remaining / 60);
      const sec = remaining % 60;
      return `${label} #${index} 还剩 ${min}:${String(sec).padStart(2, '0')}`;
    }

    async function startTimer(orderNumber, slotIndex, label, seconds, type) {

      // 🔓 解锁音频（用户点击时触发）
      doneSound.play().then(() => {
      doneSound.pause();
      doneSound.currentTime = 0;
      }).catch(()=>{});

      const state = kitchenState[orderNumber];
      if (!state) return;

      const slots = type === 'chicken' ? state.chickenSlots : state.friesSlots;
      const slot = slots[slotIndex];
      if (!slot || slot.started) return;

      slot.started = true;
      slot.done = false;

      // ⭐ 立即更新UI状态（关键）
      const order = (orderData.orders || []).find(o => o.orderNumber === orderNumber);
      if (order) order.orderStatus = 'Cooking';

      // ⭐ 先render（不要等backend）
      renderKitchen();

      // ⭐ 再丢去backend（不要await）
      updateOrderStatus(orderNumber, 'Cooking');

      const timerId = `${orderNumber}-${type}-${slotIndex}`;
      const area = document.getElementById('timers-' + orderNumber);

      let box = document.getElementById(timerId);
      if (!box && area) {
        box = document.createElement('div');
        box.id = timerId;
        box.className = 'timer-box';
        area.appendChild(box);
      }

      activeTimers[timerId] = {
        orderNumber,
        slotIndex,
        type,
        label,
        remaining: seconds,
        done: false,
        interval: null
      };

      if (box) {
        box.textContent = formatTimerText(label, slotIndex + 1, seconds);
      }

      activeTimers[timerId].interval = setInterval(() => {
        const timer = activeTimers[timerId];
        if (!timer) return;

        timer.remaining -= 1;
        const el = document.getElementById(timerId);

        // 🔥 最后10秒 → 加警告效果
        if (timer.remaining <= 10 && timer.remaining > 0) {
        if (el) el.classList.add('warning');
        } else {
        if (el) el.classList.remove('warning');
        }

        if (timer.remaining <= 0) {
          clearInterval(timer.interval);
          timer.remaining = 0;
          timer.done = true;
          slot.done = true;

          // 🔊 只响一次
          try {
          doneSound.currentTime = 0;
          doneSound.play();
          } catch(e) {}
          if (el) {
            el.textContent = `${label} #${slotIndex + 1} 可以起锅`;
            el.classList.add('done');
          }

          if (el) el.classList.remove('warning');

          if (isOrderReady(orderNumber)) {
            const foundOrder = (orderData.orders || []).find(o => o.orderNumber === orderNumber);
            if (foundOrder && foundOrder.orderStatus !== 'Collected') {
              foundOrder.orderStatus = 'Ready';
            }
            updateOrderStatus(orderNumber, 'Ready', '', false);
            renderKitchen();
          }
          return;
        }

        if (el) {
          el.textContent = formatTimerText(label, slotIndex + 1, timer.remaining);
        }
      }, 1000);
    }

    function startChickenTimer(orderNumber, slotIndex) {
      startTimer(orderNumber, slotIndex, '鸡排', 120, 'chicken');
    }

    function startFriesTimer(orderNumber, slotIndex) {
      startTimer(orderNumber, slotIndex, '薯条', 240, 'fries');
    }

    async function updateOrderStatus(orderNumber, status, collectedAt = '') {
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'updateOrderStatus',
        orderNumber,
        orderStatus: status,
        collectedAt
      })
    });

    loadOrders(); // 强制同步
  } catch (err) {
    setStatus('更新状态失败', true);
  }
}

    function markCollected(orderNumber) {
      if (!isOrderReady(orderNumber)) {
        setStatus('这单还没全部完成，不能出餐', true);
        return;
      }

      Object.keys(activeTimers).forEach(timerId => {
        const timer = activeTimers[timerId];
        if (timer && timer.orderNumber === orderNumber) {
          clearInterval(timer.interval);
          delete activeTimers[timerId];
        }
      });

      delete kitchenState[orderNumber];
      updateOrderStatus(orderNumber, 'Collected', new Date().toLocaleString());
    }

    function isToday(dateValue) {
      const d = new Date(dateValue);
      const now = new Date();
      return d.getFullYear() === now.getFullYear()
        && d.getMonth() === now.getMonth()
        && d.getDate() === now.getDate();
    }

    function renderReport() {
      const orders = (orderData.orders || []).filter(order => isToday(order.createdAt));
      const orderNumbers = new Set(orders.map(order => order.orderNumber));
      const items = (orderData.items || []).filter(item => orderNumbers.has(item.orderNumber));

      const totalRevenue = orders.reduce((sum, order) => sum + (Number(order.total) || 0), 0);
      const collectedCount = orders.filter(order => order.orderStatus === 'Collected').length;
      const uncollectedCount = orders.filter(order => order.orderStatus !== 'Collected').length;

      const countItem = (name) =>
        items.filter(item => item.itemName === name)
             .reduce((sum, item) => sum + item.quantity, 0);

      document.getElementById('reportOrders').textContent = orders.length;
      document.getElementById('reportRevenue').textContent = formatMoney(totalRevenue);
      document.getElementById('reportCollected').textContent = collectedCount;
      document.getElementById('reportUncollected').textContent = uncollectedCount;
      document.getElementById('reportCombo').textContent = countItem('Combo');
      document.getElementById('reportOriginal').textContent = countItem('Original');
      document.getElementById('reportSpicy').textContent = countItem('Spicy');
      document.getElementById('reportSeaweed').textContent = countItem('Seaweed');
      document.getElementById('reportFries').textContent = countItem('Fries');
    }

    function viewReceipt(base64){
  let win = window.open();
  win.document.write('<img src="'+base64+'" style="width:100%">');
}
    function explodeItem(itemName, qty) {
  let chicken = 0;
  let fries = 0;

  if (itemName === 'Combo') {
    chicken += qty;
    fries += qty;
  }

  if (['Original', 'Spicy', 'Seaweed'].includes(itemName)) {
    chicken += qty;
  }

  if (itemName === 'Fries') {
    fries += qty;
  }

  return { chicken, fries };
}
    
    renderCurrentOrder();
    loadOrders();
    setInterval(loadOrders, 10000);
  </script>
